<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { font-family: Arial; background: #f5f7fa; }
.header { background: #4facfe; color: white; padding: 15px; text-align: center; }
.container { width: 60%; margin: auto; margin-top: 30px; background: white; padding: 20px; border-radius: 10px; }
input, button { padding: 10px; margin: 10px; }
button { background: #4facfe; color: white; border: none; }
.result { padding: 10px; margin-top: 10px; border-radius: 5px; }
.bullying { background: #ffcccc; }
.normal { background: #ccffcc; }
</style>
</head>
<body>
<div class="header">
<h2>Student Dashboard</h2>
</div>

<div class="container">
<form method="post">
<input name="text" placeholder="Enter text" required>
<button type="submit">Check</button>
</form>

{% if result %}
<div class="result {{ result }}">
<strong>Result:</strong> {{ result }}
</div>
{% endif %}

<a href="/logout">Logout</a>
</div>
</body>
</html>
