<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { font-family: Arial; background: linear-gradient(to right, #4facfe, #00f2fe); }
.container { width: 300px; margin: 100px auto; padding: 20px; background: white; border-radius: 10px; text-align: center; }
input, button { width: 90%; padding: 10px; margin: 10px; }
button { background: #4facfe; color: white; border: none; cursor: pointer; }
a { display: block; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
<h2>Login</h2>
<form method="post">
<input name="username" placeholder="Username" required><br>
<input type="password" name="password" placeholder="Password" required><br>
<button type="submit">Login</button>
</form>
<a href="/register">Register</a>
</div>
</body>
</html>
