<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body { font-family: Arial; background: linear-gradient(to right, #43e97b, #38f9d7); }
.container { width: 300px; margin: 100px auto; padding: 20px; background: white; border-radius: 10px; text-align: center; }
input, select, button { width: 90%; padding: 10px; margin: 10px; }
button { background: #43e97b; color: white; border: none; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
<h2>Register</h2>
<form method="post">
<input name="username" placeholder="Username" required><br>
<input type="password" name="password" placeholder="Password" required><br>
<select name="role">
<option value="student">Student</option>
<option value="admin">Admin</option>
</select><br>
<button type="submit">Register</button>
</form>
</div>
</body>
</html>
